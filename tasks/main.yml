# SPDX-License-Identifier: MIT
---
- name: Set platform/version specific variables
  include_tasks: tasks/set_vars.yml

- name: Deploy the GPG key for RHEL EPEL repository
  rpm_key:
    key: "{{ hpc_rhel_epel_rpm_key }}"
    state: present

# package dkms is required from this repo
- name: Install EPEL release package
  package:
    name: "{{ hpc_rhel_epel_rpm }}"
    state: present
    use: "{{ (__hpc_server_is_ostree | d(false)) |
      ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

- name: Deploy the GPG key for NVIDIA repositories
  rpm_key:
    key: "{{ hpc_nvidia_rpm_key }}"
    state: present

- name: Configure the NVIDIA CUDA repository
  yum_repository:
    name: nvidia-cuda
    description: NVIDIA CUDA repository
    baseurl: "{{ hpc_nvidia_cuda_repository }}"
    gpgcheck: true

- name: Deploy Microsoft GPG key
  rpm_key:
    key: "{{ hpc_microsoft_rpm_key }}"
    state: present
  register: __mssql_gpg
  until: __mssql_gpg is success

- name: Configure Microsoft repository
  yum_repository:
    name: microsoft-prod
    description: Microsoft Production Repository
    baseurl: "{{ hpc_microsoft_rpm }}"
    gpgcheck: true

- name: Configure storage
  when: hpc_manage_storage
  block:
    - name: Install lvm2 to get lvs command
      package:
        name: lvm2
        state: present
        use: "{{ (__hpc_server_is_ostree | d(false)) |
          ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

    - name: Get current LV size of {{ hpc_rootlv_name }}
      vars:
        __hpc_lv: /dev/mapper/{{ hpc_rootvg_name }}-{{ hpc_rootlv_name }}
      command: lvs --noheadings --units g --nosuffix -o lv_size {{ __hpc_lv }}
      register: __hpc_rootlv_size_cmd
      changed_when: false

    - name: Get current LV size of {{ hpc_usrlv_name }}
      vars:
        __hpc_lv: /dev/mapper/{{ hpc_rootvg_name }}-{{ hpc_usrlv_name }}
      command: lvs --noheadings --units g --nosuffix -o lv_size {{ __hpc_lv }}
      register: __hpc_usrlv_size_cmd
      changed_when: false

    - name: Configure storage
      include_role:
        name: fedora.linux_system_roles.storage
      vars:
        hpc_rootlv_size_expected: >-
          {{ hpc_rootlv_size | regex_replace('[^0-9]', '') | int }}
        hpc_rootlv_size_curr: "{{ __hpc_rootlv_size_cmd.stdout | int }}"
        __hpc_rootlv_size: >-
          {{ (hpc_rootlv_size_expected | int > hpc_rootlv_size_curr | int)
          | ternary(hpc_rootlv_size, hpc_rootlv_size_curr ~ "G") }}
        hpc_usrlv_size_expected: >-
          {{ hpc_usrlv_size | regex_replace('[^0-9]', '') | int }}
        hpc_usrlv_size_curr: "{{ __hpc_usrlv_size_cmd.stdout | int }}"
        __hpc_usrlv_size: >-
          {{ (hpc_usrlv_size_expected | int > hpc_usrlv_size_curr | int)
          | ternary(hpc_usrlv_size, hpc_usrlv_size_curr ~ "G") }}
        storage_pools:
          - name: "{{ hpc_rootvg_name }}"
            grow_to_fill: true
            volumes:
              - name: "{{ hpc_rootlv_name }}"
                size: "{{ __hpc_rootlv_size }}"
                mount_point: "{{ hpc_rootlv_mount }}"
              - name: "{{ hpc_usrlv_name }}"
                size: "{{ __hpc_usrlv_size }}"
                mount_point: "{{ hpc_usrlv_mount }}"

- name: Clean dnf cache
  command: dnf clean expire-cache
  changed_when: false

# use --nobest to work around broken kernel module update dependencies in base
# image
- name: Update packages
  package:
    name: "*"
    state: latest
    nobest: true
    use: "{{ (__hpc_server_is_ostree | d(false)) |
      ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

- name: Force install kernel
  package:
    name: kernel-{{ __hpc_force_kernel_version }}
    state: present
  when: __hpc_force_kernel_version is not none
  notify: Reboot system

- name: >-
    Explicitly install kernel-devel and kernel-headers packages matching the
    currently running kernel
  package:
    name:
      - kernel-devel-{{ ansible_kernel }}
      - kernel-headers-{{ ansible_kernel }}
    state: present
  notify: Reboot system

- name: Flush handlers to apply new kernel
  meta: flush_handlers

- name: Ensure that dnf-command(versionlock) is installed
  package:
    name: dnf-command(versionlock)
    state: present

- name: Check if kernel versionlock entries exist
  stat:
    path: "{{ __hpc_versionlock_path }}"
  register: __hpc_versionlock_stat

- name: Get content of versionlock file
  command: cat {{ __hpc_versionlock_path }}
  register: __hpc_versionlock_content
  changed_when: false
  when: __hpc_versionlock_stat.stat.exists

# once nvidia drivers are built for a specific kernel version, we need to
# prevent installation of all kernel packages of a different version
# MS unsuccessfully tries to do this in azhpc-images build scripts:
# https://github.com/Azure/azhpc-images/blob/a3f92d283af6c9d11bf08eb0f8763ab67f7c8713/partners/rhel/common/install_utils.sh#L61
- name: Prevent installation of all kernel packages of a different version
  command: dnf versionlock add {{ item }}
  register: __hpc_versionlock_check
  changed_when: true
  when: >-
    not __hpc_versionlock_stat.stat.exists
    or __hpc_versionlock_content.stdout is not search(item  + "-[0-9]")
  loop: "{{ __hpc_versionlock_rpms }}"

- name: Enable nvidia-driver
  package:
    name: "{{ hpc_nvidia_driver_module }}"
    state: present
    use: "{{ (__hpc_server_is_ostree | d(false)) |
      ternary('ansible.posix.rhel_rpm_ostree', omit) }}"
  notify: Reboot system
  when: ansible_system_vendor == "Microsoft Corporation"

- name: Install CUDA driver and enable nvidia-persistenced.service
  when:
    - ansible_system_vendor == "Microsoft Corporation"
    - hpc_install_cuda_driver
  block:
    - name: Install CUDA driver
      package:
        name: "{{ hpc_cuda_driver_packages }}"
        state: present
        use: "{{ (__hpc_server_is_ostree | d(false)) |
          ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

    - name: Enable nvidia-persistenced.service
      service:
        name: nvidia-persistenced.service
        enabled: true

- name: Install CUDA Toolkit
  when:
    - hpc_install_cuda_toolkit
    - ansible_system_vendor == "Microsoft Corporation"
  package:
    name: "{{ hpc_cuda_toolkit_packages }}"
    state: present
    use: "{{ (__hpc_server_is_ostree | d(false)) |
      ternary('ansible.posix.rhel_rpm_ostree', omit) }}"
  register: __hpc_install_cuda_toolkit
  until: __hpc_install_cuda_toolkit is success

- name: Install NVIDIA NCCL
  when: hpc_install_hpc_nvidia_nccl
  package:
    name: "{{ hpc_nvidia_nccl_packages }}"
    state: present
    use: "{{ (__hpc_server_is_ostree | d(false)) |
      ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

- name: Install NVIDIA Fabric Manager and enable service
  when: hpc_install_nvidia_fabric_manager
  block:
    - name: Install NVIDIA Fabric Manager
      package:
        name: "{{ hpc_nvidia_fabric_manager_packages }}"
        state: present
        use: "{{ (__hpc_server_is_ostree | d(false)) |
          ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

    - name: Ensure that Fabric Manager service is enabled
      service:
        name: nvidia-fabricmanager
        enabled: true

- name: Install NVIDIA RDMA packages
  when: hpc_install_nvidia_rdma
  package:
    name: "{{ hpc_nvidia_rdma_packages }}"
    state: present
    use: "{{ (__hpc_server_is_ostree | d(false)) |
      ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

# azhpc-images build scripts do the same thing here:
# https://github.com/Azure/azhpc-images/blob/a3f92d283af6c9d11bf08eb0f8763ab67f7c8713/common/install_waagent.sh#L53
- name: Enable RDMA in waagent configuration
  when: hpc_install_nvidia_rdma
  lineinfile:
    path: /etc/waagent.conf
    line: "OS.EnableRDMA=y"
    create: true
    backup: true
    mode: "0644"
  notify: Restart waagent

- name: Get package facts
  package_facts:
  no_log: true

- name: Debug package facts
  debug:
    var: ansible_facts.packages

- name: Install gdrcopy packages
  when: >-
    ("gdrcopy" not in ansible_facts.packages
    or ansible_facts.packages.gdrcopy.version != hpc_gdrcopy_info.version)
    or ("gdrcopy-kmod" not in ansible_facts.packages
    or ansible_facts.packages.["gdrcopy-kmod"].version
    != hpc_gdrcopy_info.version)
    or ("gdrcopy-devel" not in ansible_facts.packages
    or ansible_facts.packages.["gdrcopy-devel"].version
    != hpc_gdrcopy_info.version)
  block:
      - name: Download gdrcopy
        include_tasks: tasks/download_extract_package.yml
        vars:
          package_info: "{{ hpc_gdrcopy_info }}"

      - name: Install packages for {{ hpc_gdrcopy_info.name }}
        package:
          name:
            - gdrcopy-kmod-{{ hpc_gdrcopy_info.version }}dkms.{{ hpc_gdrcopy_info.distribution }}.noarch.rpm
            - gdrcopy-{{ hpc_gdrcopy_info.version }}.{{ hpc_gdrcopy_info.distribution }}.x86_64.rpm
            - gdrcopy-devel-{{ hpc_gdrcopy_info.version }}.{{ hpc_gdrcopy_info.distribution }}.noarch.rpm
          state: present
          use: "{{ (__hpc_server_is_ostree | d(false)) |
            ternary('ansible.posix.rhel_rpm_ostree', omit) }}"

- name: Download hpcx
  include_tasks: tasks/download_extract_package.yml
  vars:
    package_info: "{{ hpc_hpcx_info }}"

- debug:
    var: __hpc_package_extracted

- name: Set facts for building hpcx and openmpi
  set_fact:
    hpc_hpcx_folder:  "{{ __hpc_package_extracted.path | basename }}"
    hpc_hpcx_path: "{{ hpc_install_prefix }}/{{ hpc_hpcx_folder }}"
    hpc_hcoll_path: "{{ hpc_hpcx_path }}/hcoll"
    hpc_ucx_path: "{{ hpc_hpcx_path }}/ucx"
    hpc_pmix_path: "{{ hpc_install_prefix }}/{{ hpc_pmix_info.name }}/{{ hpc_pmix_info.version | split('-') | first }}"
    hpc_openmpi_path: "{{ hpc_install_prefix }}/{{ hpc_openmpi_info.name }}/{{ hpc_openmpi_info.version }}"

# Pacakages are installed in /opt, not "/build-result", so pkgconfig
# files used by openmpi's cmake configure scripts need to be updated.
- name: Update pkgconfig files used by openmpi's cmake configure scripts
  replace:
    path: "{{ item }}"
    regexp: "/build-result/"
    replace: "{{ hpc_install_prefix }}"
  loop:
    - "{{ __hpc_package_extracted.path }}/hcoll/lib/pkgconfig/hcoll.pc"
    - "{{ __hpc_package_extracted.path }}/ucx/lib/pkgconfig/ucx.pc"

# the shipped pkgconfig for hcoll only includes -lhcoll. However, this
# library depends on -locoms, so we have to add that to prevent openmpi
# from failing to link against libhcoll.
- name: Update hcoll pkgconfig file
  replace:
    path: "{{ __hpc_package_extracted.path }}/hcoll/lib/pkgconfig/hcoll.pc"
    regexp: "-lhcoll"
    replace: "-lhcoll -locoms"

- name: Copy hpcx to {{ hpc_install_prefix }}
  copy:
    src: "{{ __hpc_package_extracted.path }}"
    dest: "{{ hpc_hpcx_path }}"
    mode: "0755"
    owner: root
    group: root

- name: Rebuild hpcx
  shell: >-
    CUDA_HOME=/usr/local/cuda
    {{ hpc_hpcx_path }}/utils/hpcx_rebuild.sh --with-hcoll --cuda
    --rebuild-ucx --ompi-extra-config "--with-pmix={{ hpc_pmix_path }}
    --enable-orterun-prefix-by-default"
  changed_when: true

- name: Copy hpcx-rebuild to {{ hpc_install_prefix }}
  copy:
    src: "{{ hpc_hpcx_path }}/ompi/tests"
    dest: "{{ hpc_hpcx_path }}/hpcx-rebuild"
    mode: "0755"
    owner: root
    group: root

- name: Download {{ hpc_openmpi_info.name }}
  include_tasks: tasks/download_extract_package.yml
  vars:
    package_info: "{{ hpc_openmpi_info }}"

- name: Build {{ hpc_openmpi_info.name }}
  shell:
    cmd: >-
      ./configure --prefix={{ hpc_openmpi_path }}
        --with-ucx={{ hpc_ucx_path }} --with-hcoll={{ hpc_hcoll_path }}
        --with-pmix={{ hpc_pmix_path }} --enable-mpirun-prefix-by-default
        --with-platform=contrib/platform/mellanox/optimized
    chdir: "{{ __hpc_package_extracted.path }}"
  changed_when: true

- name: Build {{ hpc_openmpi_info.name }}
  shell: make -j$(nproc) && make install
  changed_when: true

- name: Let user's applications lock as much memory as they need
  lineinfile:
    path: /etc/security/limits.conf
    line: "{{ item }}"
    create: true
    backup: true
    mode: "0644"
  loop:
    - "* soft memlock unlimited"
    - "* hard memlock unlimited"
