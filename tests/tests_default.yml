# SPDX-License-Identifier: MIT
---
- name: Ensure that the role runs with default parameters
  hosts: all
  # Do not do anything in this test, otherwise fails with not enough storage
  vars:
    hpc_manage_storage: false
    hpc_install_nvidia_driver: false
    hpc_install_cuda_driver: false
    hpc_install_cuda_toolkit: false
    hpc_install_hpc_nvidia_nccl: false
    hpc_install_nvidia_fabric_manager: false
    hpc_install_nvidia_dcgm: false
    hpc_install_rdma: false
    hpc_install_system_openmpi: false
    hpc_build_openmpi_w_nvidia_gpu_support: false
    hpc_enable_eus_repo: false
    hpc_install_moneo: false
    hpc_install_nvidia_container_toolkit: false
    hpc_install_docker: "{{ hpc_install_nvidia_container_toolkit }}"
    hpc_install_azurehpc_health_checks: "{{ hpc_install_nvidia_container_toolkit }}"
    hpc_install_diagnostics: false
    hpc_azure_disable_predictable_net_names: false
    hpc_tuning: false
    hpc_sku_customisation: false
    hpc_install_kvp_client: false
  tasks:
    - name: See if /dev/log exists for the fingerprint check
      ansible.builtin.stat:
        path: /dev/log
      register: __register_dev_log

    - name: Set the start time for the journal search
      ansible.builtin.set_fact:
        __journal_start_time: "{{ ansible_facts['date_time']['date'] ~ ' ' ~ ansible_facts['date_time']['time'] }}"
      when: __register_dev_log.stat.exists

    - name: Skip unsupported architectures
      include_tasks: tasks/skip_unsupported_archs.yml

    - name: Run test in a block to clean up in always
      block:
        - name: Run the role
          include_tasks: tasks/run_role_with_clear_facts.yml

        # look for the exact module invocation, not some other message that might contain the string
        - name: Check system journal contains role fingerprints
          ansible.builtin.shell:
            executable: /bin/bash
            cmd: >-
              set -eo pipefail;
              journalctl --since "{{ __journal_start_time }}" --no-pager |
              grep -v " Invoked with" | grep "sr_fingerprint.*begin system_role:hpc" ||
              { echo ERROR: BEGIN fingerprint not found; exit 1; };
              journalctl --since "{{ __journal_start_time }}" --no-pager |
              grep -v " Invoked with" | grep "sr_fingerprint.*success system_role:hpc" ||
              { echo ERROR: SUCCESS fingerprint not found; exit 1; }
          changed_when: false
          when: __register_dev_log.stat.exists
      always:
        - name: Cleanup
          include_tasks: tasks/cleanup.yml
